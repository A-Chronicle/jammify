<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jammify - Retro Vibe Landing</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #0a0a0f;
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ===== CANVAS PARTICLES ===== */
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ===== ANIMATED GRADIENT BG ===== */
  .bg-gradient {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 80%, rgba(131, 58, 180, 0.25) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 20%, rgba(29, 185, 84, 0.2) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(253, 29, 29, 0.12) 0%, transparent 60%);
    animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    0%   { opacity: 0.7; transform: scale(1); }
    100% { opacity: 1;   transform: scale(1.05); }
  }

  /* ===== DECORATIVE TURNTABLES ===== */
  .turntable {
    position: absolute;
    border-radius: 12px;
    background: #111;
    border: 2px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 40px rgba(0,0,0,0.5), 0 0 20px rgba(29,185,84,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: floatTT 7s ease-in-out infinite;
  }
  .turntable-1 {
    width: 200px; height: 200px;
    top: 12%; left: 5%;
    transform: rotate(-8deg);
    animation-delay: 0s;
  }
  .turntable-2 {
    width: 160px; height: 160px;
    top: 55%; right: 6%;
    transform: rotate(5deg);
    animation-delay: 2s;
  }
  .turntable-3 {
    width: 130px; height: 130px;
    bottom: 12%; left: 28%;
    transform: rotate(-3deg);
    animation-delay: 4s;
  }
  @keyframes floatTT {
    0%, 100% { transform: translateY(0) rotate(var(--rot, -8deg)); opacity: 0.12; }
    50%      { transform: translateY(-18px) rotate(calc(var(--rot, -8deg) + 6deg)); opacity: 0.2; }
  }
  .turntable-1 { opacity: 0.12; --rot: -8deg; }
  .turntable-2 { opacity: 0.1; --rot: 5deg; }
  .turntable-3 { opacity: 0.08; --rot: -3deg; }

  .tt-platter {
    width: 75%;
    height: 75%;
    border-radius: 50%;
    background:
      radial-gradient(circle at center, #1DB954 18%, transparent 19%),
      radial-gradient(circle at center, #1a1a1a 30%, transparent 31%),
      repeating-conic-gradient(
        from 0deg,
        rgba(40,40,40,0.9) 0deg 6deg,
        rgba(22,22,22,0.9) 6deg 12deg
      );
    border: 2px solid rgba(60,60,60,0.4);
    animation: spin 4s linear infinite;
    position: relative;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
  }
  .turntable-2 .tt-platter { animation-duration: 5s; }
  .turntable-3 .tt-platter { animation-duration: 3.5s; }

  .tt-grooves {
    position: absolute;
    inset: 15%;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.04);
    box-shadow:
      inset 0 0 0 4px rgba(255,255,255,0.02),
      inset 0 0 0 8px rgba(255,255,255,0.03),
      inset 0 0 0 12px rgba(255,255,255,0.02),
      inset 0 0 0 16px rgba(255,255,255,0.03),
      inset 0 0 0 20px rgba(255,255,255,0.02);
  }
  .tt-label-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 22%;
    height: 22%;
    border-radius: 50%;
    background: radial-gradient(circle, #1DB954 40%, #16a34a 100%);
    box-shadow: 0 0 8px rgba(29,185,84,0.5);
  }
  .tt-label-center::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20%;
    height: 20%;
    border-radius: 50%;
    background: #000;
  }

  /* ===== SPOTLIGHT BEAMS ===== */
  .spotlight {
    position: absolute;
    width: 4px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
    transform-origin: top center;
    animation: beamSway 6s ease-in-out infinite;
    opacity: 0.4;
  }
  .spotlight:nth-child(1) {
    height: 70vh; top: -5%; left: 15%;
    transform: rotate(-15deg);
    background: linear-gradient(to bottom, rgba(255, 0, 150, 0.3), transparent 80%);
    animation-delay: 0s;
  }
  .spotlight:nth-child(2) {
    height: 60vh; top: -5%; left: 50%;
    transform: rotate(0deg);
    background: linear-gradient(to bottom, rgba(29, 185, 84, 0.25), transparent 80%);
    animation-delay: 2s;
  }
  .spotlight:nth-child(3) {
    height: 70vh; top: -5%; right: 15%;
    transform: rotate(15deg);
    background: linear-gradient(to bottom, rgba(150, 50, 255, 0.3), transparent 80%);
    animation-delay: 4s;
  }
  @keyframes beamSway {
    0%, 100% { transform: rotate(var(--base-rot, 0deg)); opacity: 0.3; }
    50%      { transform: rotate(calc(var(--base-rot, 0deg) + 10deg)); opacity: 0.7; }
  }

  /* ===== EQ BARS (decorative) ===== */
  .eq-container {
    position: absolute;
    display: flex;
    gap: 4px;
    align-items: flex-end;
    opacity: 0.15;
  }
  .eq-bar {
    width: 6px;
    background: linear-gradient(to top, #1DB954, #1ed760);
    border-radius: 3px;
    animation: eqBounce var(--dur) ease-in-out infinite alternate;
  }
  @keyframes eqBounce {
    0%   { height: var(--h1); }
    100% { height: var(--h2); }
  }

  /* ===== CONTENT ===== */
  .content {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.5px;
  }
  .nav-logo svg { width: 36px; height: 36px; }
  .nav-links { display: flex; gap: 32px; align-items: center; }
  .nav-links a {
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: #fff; }

  /* HERO */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px 40px;
    min-height: calc(100vh - 80px);
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border-radius: 50px;
    background: rgba(29, 185, 84, 0.12);
    border: 1px solid rgba(29, 185, 84, 0.25);
    color: #1DB954;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 32px;
    animation: badgeFadeIn 1s ease-out 0.3s both;
  }
  .hero-badge .dot {
    width: 8px; height: 8px;
    background: #1DB954;
    border-radius: 50%;
    animation: dotPulse 1.5s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(0.7); }
  }
  @keyframes badgeFadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero h1 {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 24px;
    animation: heroTextIn 1s ease-out 0.5s both;
  }
  .hero h1 .line1 { display: block; color: #fff; }
  .hero h1 .line2 {
    display: block;
    background: linear-gradient(135deg, #1DB954, #1ed760, #69f0ae, #1DB954);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 4s ease-in-out infinite;
  }
  @keyframes gradShift {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @keyframes heroTextIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero p {
    font-size: 20px;
    color: rgba(255,255,255,0.55);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 48px;
    animation: heroTextIn 1s ease-out 0.7s both;
  }

  .hero-buttons {
    display: flex;
    gap: 16px;
    animation: heroTextIn 1s ease-out 0.9s both;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 36px;
    border-radius: 60px;
    background: linear-gradient(135deg, #1DB954, #1ed760);
    color: #000;
    font-weight: 800;
    font-size: 17px;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 0 30px rgba(29,185,84,0.35), 0 4px 15px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 62px;
    background: linear-gradient(135deg, #1DB954, #1ed760, rgba(255,255,255,0.3), #1DB954);
    background-size: 300% 300%;
    z-index: -1;
    animation: btnGlow 3s ease-in-out infinite;
  }
  @keyframes btnGlow {
    0%, 100% { background-position: 0% 50%; opacity: 0.6; }
    50%      { background-position: 100% 50%; opacity: 1; }
  }
  .btn-primary:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 0 50px rgba(29,185,84,0.5), 0 8px 25px rgba(0,0,0,0.4);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 36px;
    border-radius: 60px;
    background: transparent;
    color: #fff;
    font-weight: 700;
    font-size: 17px;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-secondary:hover {
    border-color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.05);
    transform: translateY(-2px);
  }

  /* ===== FLOATING ALBUM COVERS ===== */
  .album-float {
    position: absolute;
    z-index: 1;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.08);
    animation: floatAlbum 10s ease-in-out infinite;
  }
  .album-float img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 6px;
  }
  .album-float-1 {
    width: 180px; height: 180px;
    top: 8%; right: 15%;
    transform: rotate(-8deg);
    opacity: 0.25;
    animation-delay: 0s;
    --rot: -8deg;
  }
  .album-float-2 {
    width: 160px; height: 160px;
    top: 60%; left: 8%;
    transform: rotate(6deg);
    opacity: 0.22;
    animation-delay: 2s;
    --rot: 6deg;
  }
  .album-float-3 {
    width: 140px; height: 140px;
    bottom: 22%; right: 8%;
    transform: rotate(-4deg);
    opacity: 0.2;
    animation-delay: 4s;
    --rot: -4deg;
  }
  .album-float-4 {
    width: 150px; height: 150px;
    top: 35%; left: 4%;
    transform: rotate(10deg);
    opacity: 0.18;
    animation-delay: 1s;
    --rot: 10deg;
  }

  @keyframes floatAlbum {
    0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
    33%      { transform: translateY(-14px) rotate(calc(var(--rot, 0deg) + 3deg)); }
    66%      { transform: translateY(8px) rotate(calc(var(--rot, 0deg) - 2deg)); }
  }

  /* ===== FLOATING MUSIC NOTES ===== */
  .music-note {
    position: absolute;
    font-size: 28px;
    opacity: 0.12;
    animation: noteFloat 7s ease-in-out infinite;
    z-index: 1;
  }
  .music-note:nth-child(1) { top: 20%; left: 20%; animation-delay: 0s; font-size: 32px; }
  .music-note:nth-child(2) { top: 70%; left: 60%; animation-delay: 2s; font-size: 24px; }
  .music-note:nth-child(3) { top: 30%; right: 20%; animation-delay: 4s; font-size: 36px; }
  .music-note:nth-child(4) { bottom: 30%; left: 40%; animation-delay: 1s; font-size: 20px; }
  .music-note:nth-child(5) { top: 50%; right: 35%; animation-delay: 3s; font-size: 26px; }
  @keyframes noteFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.1; }
    25%      { transform: translateY(-25px) rotate(-8deg); opacity: 0.2; }
    75%      { transform: translateY(15px) rotate(8deg); opacity: 0.08; }
  }

  /* ===== BOTTOM WAVE ===== */
  .bottom-glow {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(to top, rgba(29,185,84,0.08), transparent);
    z-index: 1;
  }

  /* ===== FOOTER ===== */
  .footer {
    position: relative;
    z-index: 10;
    padding: 32px 48px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.3);
  }
  .footer-left { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 18px; }
  .footer-links { display: flex; gap: 24px; }
  .footer-links a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 14px; transition: color 0.2s; }
  .footer-links a:hover { color: #1DB954; }

  /* ===== DISC3 SPINNING LOGO ===== */
  .logo-spin {
    animation: vinylSpin 3s linear infinite;
  }
  @keyframes vinylSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ===== GLOW RINGS ===== */
  .glow-ring {
    position: absolute;
    border-radius: 50%;
    z-index: 1;
    pointer-events: none;
  }
  .ring-1 {
    width: 400px; height: 400px;
    top: 10%; left: 5%;
    background: radial-gradient(circle, rgba(29,185,84,0.08) 0%, transparent 70%);
    animation: ringBreathe 6s ease-in-out infinite;
  }
  .ring-2 {
    width: 350px; height: 350px;
    top: 50%; right: 5%;
    background: radial-gradient(circle, rgba(150,50,255,0.06) 0%, transparent 70%);
    animation: ringBreathe 7s ease-in-out infinite 2s;
  }
  .ring-3 {
    width: 300px; height: 300px;
    bottom: 5%; left: 25%;
    background: radial-gradient(circle, rgba(255,50,100,0.06) 0%, transparent 70%);
    animation: ringBreathe 8s ease-in-out infinite 4s;
  }
  @keyframes ringBreathe {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50%      { transform: scale(1.15); opacity: 1; }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .nav { padding: 16px 24px; }
    .nav-links a:not(.btn-primary) { display: none; }
    .hero h1 { font-size: 40px; }
    .hero-buttons { flex-direction: column; }
    .vinyl-container { display: none; }
    .spotlight { display: none; }
    .neon-ring { display: none; }
    .footer { flex-direction: column; gap: 16px; text-align: center; }
  }
</style>
</head>

      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">GitHub</a>
    </div>
  </footer>
</div>

<script>
// ===== PARTICLE SYSTEM =====
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 80;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.4;
    this.speedY = (Math.random() - 0.5) * 0.4;
    this.opacity = Math.random() * 0.4 + 0.1;
    this.hue = [140, 280, 340, 50][Math.floor(Math.random() * 4)];
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = Math.random() * 0.02 + 0.01;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.pulse += this.pulseSpeed;
    this.opacity = 0.15 + Math.sin(this.pulse) * 0.15;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.reset();
    }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity})`;
    ctx.fill();
    // Glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity * 0.15})`;
    ctx.fill();
  }
}

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push(new Particle());
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();
</script>
